<!DOCTYPE html>
<html>
<head>
<title>Ready? 🤔</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:#f0f6ff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1;}
}

h2{
  color:#5a8dee;
}

.teddy{
  width:350px;
  margin:20px 0;
  animation: float 4s ease-in-out infinite;
}
 @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }}
button{
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#5a8dee;
  color:white;
  cursor:pointer;
  margin:10px;
  font-size:15px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <h2>Are you ready for surprise?</h2>

  <!-- ADD YOUR TEDDY -->
  <img src="calmted.png" class="teddy">

  <br>
  <button onclick="yes()">YES</button>
  <button onclick="no()">NO</button>
</div>
<audio id="bgMusic"loop>
  <source src="whistle.mp3"></source>
</audio>
<script>
function yes(){
  window.location.href = "gif.html"; // your surprise page
}

function no(){
  window.location.href = "page4.html";
}
const music = document.getElementById("bgMusic");

// try autoplay first
window.onload = () => {
  music.play().catch(() => {
    // autoplay blocked → wait for touch
    enableTouchStart();
  });
};

function enableTouchStart(){
  const start = () => {
    music.play();

    // smooth fade in
    music.volume = 0;
    let vol = 0;

    let fade = setInterval(()=>{
      if(vol < 0.5){
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  };

  // works for mobile + desktop
  document.body.addEventListener("touchstart", start, { once: true });
  document.body.addEventListener("click", start, { once: true });
}
</script>

</body>
</html>
