<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nayanaaa! 💙</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #6ea9e1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN CARD */
.container {
  background: #7fb4e7;
  padding: 30px;
  border-radius: 20px;
  display: flex;
  gap: 40px;
  align-items: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* LEFT SIDE (PHOTO) */
.photo-box {
  position: relative;
}

.polaroid {
  background: white;
  padding: 10px;
  border-radius: 10px;
  transform: rotate(-5deg);
}

.polaroid img {
  width: 180px;
  border-radius: 8px;
}

/* Cute teddy */
.teddy {
  position: absolute;
  bottom: -20px;
  left: -20px;
  width: 150px;
   animation: float 4s ease-in-out infinite;
     
    
    }
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }
.ribbon{
  position:absolute;
  left:100px;
  top:-50px;
  right:-5px;
  width:150px;
  transform:rotate(22deg);
}
/* RIGHT SIDE */
.passcode-box {
  text-align: center;
  color: white;
}

.passcode-box h3 {
  margin-bottom: 15px;
}

/* INPUT DOTS */
.dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.dot {
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
}

/* KEYPAD */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
  justify-content: center;
}

.key {
  background: white;
  color: #6ea9e1;
  border-radius: 50%;
  height: 60px;
  font-size: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}

.key:hover {
  background: #dfefff;
}

/* NEXT BUTTON */
.next-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: white;
  color: #6ea9e1;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="photo-box">
    <div class="polaroid">
      <!-- PUT YOUR IMAGE HERE -->
      <img src="img.jpg" alt="photo">
    </div>
    <img class="ribbon" src="ribo.png">
    <img class="teddy" src="ted.png">
  </div>

  <!-- RIGHT -->
  <div class="passcode-box">
    <h3>Enter a passcode</h3>

    <div class="dots" id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="keypad">
      <div class="key">1</div>
      <div class="key">2</div>
      <div class="key">3</div>
      <div class="key">4</div>
      <div class="key">5</div>
      <div class="key">6</div>
      <div class="key">7</div>
      <div class="key">8</div>
      <div class="key">9</div>
      <div class="key">*</div>
      <div class="key">0</div>
      <div class="key">#</div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="goNext()">Next 💖</button>
  </div>

</div>
<audio id="bgMusic"loop>
  <source src="Singari – Acoustic.mp3"></>
</audio>
<script>
let input = "";

const keys = document.querySelectorAll(".key");
const dots = document.querySelectorAll(".dot");
const nextBtn = document.getElementById("nextBtn");

keys.forEach(key => {
  key.addEventListener("click", () => {
    if (input.length < 4) {
      input += key.innerText;
      dots[input.length - 1].style.background = "white";
    }

    // Show next button after 4 digits
    if (input.length === 4) {
      nextBtn.style.display = "inline-block";
    }
  });
});
const music = document.getElementById("bgMusic");

// try autoplay first
window.onload = () => {
  music.play().catch(() => {
    // autoplay blocked → wait for touch
    enableTouchStart();
  });
};

function enableTouchStart(){
  const start = () => {
    music.play();

    // smooth fade in
    music.volume = 0;
    let vol = 0;

    let fade = setInterval(()=>{
      if(vol < 0.5){
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  };

  // works for mobile + desktop
  document.body.addEventListener("touchstart", start, { once: true });
  document.body.addEventListener("click", start, { once: true });
}
function goNext() {
  window.location.href = "page2.html"; // next page
}
</script>

</body>
</html>
